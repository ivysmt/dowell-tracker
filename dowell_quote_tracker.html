<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dowell 外銷報價追蹤系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e2e0d8;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09e97;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --won: #16a34a;
    --won-bg: #dcfce7;
    --lost: #dc2626;
    --lost-bg: #fee2e2;
    --pending: #d97706;
    --pending-bg: #fef3c7;
    --replaced: #7c3aed;
    --replaced-bg: #ede9fe;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--text);
    color: white;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
  header span { font-size: 0.8rem; color: #aaa; font-family: 'DM Mono', monospace; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  .kpi-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    gap: 32px;
    overflow-x: auto;
  }
  .kpi { display: flex; flex-direction: column; gap: 2px; min-width: 90px; }
  .kpi-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .kpi-value { font-size: 1.3rem; font-weight: 600; font-family: 'DM Mono', monospace; }
  .kpi-value.won { color: var(--won); }
  .kpi-value.lost { color: var(--lost); }
  .kpi-value.pending { color: var(--pending); }

  .main { display: flex; height: calc(100vh - 118px); }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 18px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .filter-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .search-box {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface2);
    outline: none;
    transition: border 0.15s;
  }
  .search-box:focus { border-color: var(--accent); background: white; }

  .filter-chips { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
  .chip {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    color: var(--text2);
  }
  .chip:hover { background: var(--accent-light); color: var(--accent); border-color: #bfdbfe; }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .chip-count { font-size: 0.7rem; opacity: 0.7; font-family: 'DM Mono', monospace; }

  .status-filters { display: flex; flex-direction: column; gap: 4px; }
  .status-btn {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1.5px solid transparent;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    text-align: left;
    transition: all 0.12s;
  }
  .status-btn.all { background: var(--surface2); color: var(--text2); }
  .status-btn.all.active { background: var(--text); color: white; }
  .status-btn.pending { background: var(--pending-bg); color: var(--pending); }
  .status-btn.pending.active { border-color: var(--pending); }
  .status-btn.won { background: var(--won-bg); color: var(--won); }
  .status-btn.won.active { border-color: var(--won); }
  .status-btn.lost { background: var(--lost-bg); color: var(--lost); }
  .status-btn.lost.active { border-color: var(--lost); }
  .status-btn.replaced { background: var(--replaced-bg); color: var(--replaced); }
  .status-btn.replaced.active { border-color: var(--replaced); }

  .date-range { display: flex; flex-direction: column; gap: 6px; }
  .date-range input {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    outline: none;
    color: var(--text);
  }
  .date-range input:focus { border-color: var(--accent); }
  .date-label { font-size: 0.72rem; color: var(--text3); }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .result-count { font-size: 0.82rem; color: var(--text2); }
  .sort-select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    cursor: pointer;
    outline: none;
  }
  .btn-clear {
    padding: 6px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--text2);
  }
  .btn-clear:hover { background: var(--lost-bg); color: var(--lost); border-color: var(--lost); }

  .quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .quote-card:hover { border-color: #c0bcb0; box-shadow: 0 3px 10px rgba(0,0,0,0.09); transform: translateY(-1px); }
  .quote-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }

  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .card-date { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text3); white-space: nowrap; padding-top: 2px; }
  .card-main { flex: 1; }
  .card-client { font-weight: 600; font-size: 0.95rem; }
  .card-model { font-size: 0.82rem; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .card-price { font-family: 'DM Mono', monospace; font-size: 0.88rem; font-weight: 600; color: var(--accent); white-space: nowrap; }

  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
  }
  .tag-country { background: #f0f0e8; color: #5a5748; }
  .tag-user { background: #ede9fe; color: #6d28d9; }
  .tag-note { background: #fef9c3; color: #92400e; font-size: 0.68rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .status-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-left: auto;
  }
  .status-badge.pending { background: var(--pending-bg); color: var(--pending); }
  .status-badge.won { background: var(--won-bg); color: var(--won); }
  .status-badge.lost { background: var(--lost-bg); color: var(--lost); }
  .status-badge.replaced { background: var(--replaced-bg); color: var(--replaced); }

  .followup-count {
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* Detail Panel */
  .detail-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 480px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
    display: flex;
    flex-direction: column;
  }
  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-close {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-close:hover { background: var(--lost-bg); }
  .panel-title { font-weight: 600; font-size: 1rem; }

  .panel-body { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-item label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); display: block; margin-bottom: 3px; }
  .info-item span { font-size: 0.88rem; font-weight: 500; }
  .info-item.full { grid-column: 1/-1; }
  .info-item .price-big { font-family: 'DM Mono', monospace; font-size: 1.2rem; font-weight: 600; color: var(--accent); }

  .status-row { display: flex; gap: 8px; }
  .status-pick {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    transition: all 0.12s;
  }
  .status-pick.pending { background: var(--pending-bg); color: var(--pending); }
  .status-pick.pending.active { border-color: var(--pending); }
  .status-pick.won { background: var(--won-bg); color: var(--won); }
  .status-pick.won.active { border-color: var(--won); }
  .status-pick.lost { background: var(--lost-bg); color: var(--lost); }
  .status-pick.lost.active { border-color: var(--lost); }
  .status-pick.replaced { background: var(--replaced-bg); color: var(--replaced); }
  .status-pick.replaced.active { border-color: var(--replaced); }

  .section-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ivy-note-area {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    resize: vertical;
    min-height: 70px;
    outline: none;
    background: var(--surface2);
    transition: border 0.15s;
  }
  .ivy-note-area:focus { border-color: var(--accent); background: white; }

  .followups { display: flex; flex-direction: column; gap: 8px; }
  .followup-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    position: relative;
  }
  .followup-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text3); margin-bottom: 4px; }
  .followup-text { font-size: 0.84rem; line-height: 1.5; }
  .followup-delete {
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 5px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text3);
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
  }
  .followup-delete:hover { background: var(--lost-bg); color: var(--lost); }

  .add-followup { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .add-followup-row { display: flex; gap: 8px; align-items: flex-end; }
  .add-followup textarea {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.83rem;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    min-height: 50px;
    outline: none;
    background: var(--surface2);
    transition: border 0.15s;
  }
  .add-followup textarea:focus { border-color: var(--accent); background: white; }
  .add-followup input[type=date] {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    outline: none;
    color: var(--text);
    width: 140px;
  }
  .btn-add {
    padding: 8px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.12s;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-save {
    padding: 9px 20px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .btn-save:hover { opacity: 0.8; }

  .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 0.9rem; }
  
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 99;
    display: none;
  }
  .overlay.active { display: block; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0cec7; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Dowell 外銷報價追蹤</h1>
    <span>共 <span id="totalCount">0</span> 筆報價</span>
  </div>
  <div class="header-right">
    <span id="saveStatus" style="font-size:0.75rem;color:#aaa;"></span>
    <button onclick="exportBackup()" style="padding:6px 12px;border-radius:7px;border:1px solid #555;background:transparent;color:#ccc;font-size:0.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;">⬇ 匯出備份</button>
    <label style="padding:6px 12px;border-radius:7px;border:1px solid #555;background:transparent;color:#ccc;font-size:0.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;">
      ⬆ 載入備份
      <input type="file" accept=".json" onchange="importBackup(event)" style="display:none">
    </label>
  </div>
</header>

<div class="kpi-bar">
  <div class="kpi">
    <span class="kpi-label">進行中</span>
    <span class="kpi-value pending" id="kpi-pending">0</span>
  </div>
  <div class="kpi">
    <span class="kpi-label">已接單</span>
    <span class="kpi-value won" id="kpi-won">0</span>
  </div>
  <div class="kpi">
    <span class="kpi-label">失單</span>
    <span class="kpi-value lost" id="kpi-lost">0</span>
  </div>
  <div class="kpi">
    <span class="kpi-label">已取代</span>
    <span class="kpi-value" style="color:var(--replaced)" id="kpi-replaced">0</span>
  </div>
  <div class="kpi">
    <span class="kpi-label">篩選結果</span>
    <span class="kpi-value" id="kpi-filtered">0</span>
  </div>
  <div class="kpi">
    <span class="kpi-label">篩選金額</span>
    <span class="kpi-value" style="font-size:1rem" id="kpi-amount">$0</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="filter-section">
      <h3>關鍵字搜尋</h3>
      <input type="text" class="search-box" id="searchBox" placeholder="客戶、機型、使用者…">
    </div>

    <div class="filter-section">
      <h3>狀態</h3>
      <div class="status-filters">
        <button class="status-btn all active" onclick="setStatus('')">全部</button>
        <button class="status-btn pending" onclick="setStatus('pending')">⏳ 進行中</button>
        <button class="status-btn won" onclick="setStatus('won')">✅ 已接單</button>
        <button class="status-btn lost" onclick="setStatus('lost')">❌ 失單</button>
        <button class="status-btn replaced" onclick="setStatus('replaced')">🔄 已取代</button>
      </div>
    </div>

    <div class="filter-section">
      <h3>國家</h3>
      <div class="filter-chips" id="countryChips"></div>
    </div>

    <div class="filter-section">
      <h3>客戶</h3>
      <input type="text" class="search-box" id="clientSearch" placeholder="搜尋客戶…" style="margin-bottom:6px">
      <div class="filter-chips" id="clientChips"></div>
    </div>

    <div class="filter-section">
      <h3>報價日期區間</h3>
      <div class="date-range">
        <div><div class="date-label">開始</div><input type="date" id="dateFrom"></div>
        <div><div class="date-label">結束</div><input type="date" id="dateTo"></div>
      </div>
    </div>

    <button class="btn-clear" onclick="clearFilters()">✕ 清除所有篩選</button>
  </div>

  <div class="content">
    <div class="toolbar">
      <span class="result-count" id="resultCount"></span>
      <select class="sort-select" id="sortSelect" onchange="renderList()">
        <option value="date-desc">日期 新→舊</option>
        <option value="date-asc">日期 舊→新</option>
        <option value="price-desc">金額 高→低</option>
        <option value="client-asc">客戶 A→Z</option>
        <option value="country-asc">國家</option>
        <option value="followup-desc">最新追蹤記錄 新→舊</option>
      </select>
      <button id="btnHasFollowup" class="btn-clear" onclick="toggleHasFollowup()" style="border-color:var(--accent);color:var(--accent)">💬 只看有記錄</button>
    </div>
    <div id="quoteList"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <span class="panel-title" id="panelTitle">報價詳情</span>
    <span id="panelStatus" class="status-badge pending" style="margin-left:auto"></span>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

let quotes = [];
let filters = { search:'', status:'', countries:[], clients:[], dateFrom:'', dateTo:'', hasFollowup: false };

const STORAGE_KEY = 'dowell_quotes_v1';

function setStatus2(msg, color) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.style.color = color || '#aaa';
}

// ===== GOOGLE SHEETS API =====
const useSheets = () => APPS_SCRIPT_URL && APPS_SCRIPT_URL !== '在這裡貼上你的網址';

async function loadData() {
  quotes = RAW_DATA.map(r => ({...r}));

  // Always apply localStorage edits first as quick start
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      const savedMap = {};
      parsed.forEach(q => savedMap[q.id] = q);
      quotes = RAW_DATA.map(r => {
        const s = savedMap[r.id];
        return s ? {...r, client: s.client??r.client, endUser: s.endUser??r.endUser, status: s.status, ivyNote: s.ivyNote||'', followUps: s.followUps||[]} : {...r};
      });
    }
  } catch(e) {}

  if (!useSheets()) {
    setStatus2('⚠ 尚未連接 Google Sheets，資料存於瀏覽器', '#f59e0b');
    return;
  }

  // Load from Google Sheets via JSONP (works from file://)
  setStatus2('⟳ 載入中…', '#aaa');
  try {
    await new Promise((resolve, reject) => {
      const cbName = '_cb_' + Date.now();
      window[cbName] = function(json) {
        document.head.removeChild(script);
        delete window[cbName];
        if (json.ok && json.data && json.data.length > 0) {
          const sheetsMap = {};
          json.data.forEach(q => sheetsMap[q.id] = q);
          quotes = RAW_DATA.map(r => {
            const s = sheetsMap[r.id];
            return s ? {...r, client:s.client||r.client, endUser:s.endUser||r.endUser, status:s.status||r.status, ivyNote:s.ivyNote||'', followUps:s.followUps||[]} : {...r};
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(quotes));
          setStatus2('✓ 已從 Google Sheets 載入', '#16a34a');
          setTimeout(()=>setStatus2('● 已連線 Google Sheets', '#16a34a'), 2000);
        } else {
          setStatus2('● 已連線（尚無雲端資料）', '#16a34a');
        }
        resolve();
      };
      const script = document.createElement('script');
      script.src = `${APPS_SCRIPT_URL}?method=GET&callback=${cbName}`;
      script.onerror = () => { reject(); };
      document.head.appendChild(script);
      setTimeout(reject, 10000);
    });
  } catch(e) {
    setStatus2('⚠ 無法連接 Google Sheets，顯示本機資料', '#f59e0b');
  }
}

async function saveData(q) {
  // Always save to localStorage immediately
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(quotes));
  } catch(e) {}

  if (!useSheets()) {
    setStatus2('✓ 已儲存（本機）', '#f59e0b');
    setTimeout(()=>setStatus2('⚠ 尚未連接 Google Sheets', '#f59e0b'), 2000);
    return;
  }

  // Save to Google Sheets via hidden form POST (works from file://)
  setStatus2('⟳ 儲存中…', '#aaa');
  try {
    await new Promise((resolve, reject) => {
      const cbName = '_save_' + Date.now();
      window[cbName] = function(json) {
        delete window[cbName];
        if (json.ok) {
          setStatus2('✓ 已儲存到 Google Sheets', '#16a34a');
          setTimeout(()=>setStatus2('● 已連線 Google Sheets', '#16a34a'), 2000);
        } else {
          setStatus2('⚠ 雲端儲存失敗，已存本機', '#f59e0b');
        }
        resolve();
      };
      const params = new URLSearchParams({
        method: 'SAVE',
        callback: cbName,
        id: q.id,
        client: q.client || '',
        endUser: q.endUser || '',
        status: q.status,
        ivyNote: q.ivyNote || '',
        followUps: JSON.stringify(q.followUps || [])
      });
      const script = document.createElement('script');
      script.src = `${APPS_SCRIPT_URL}?${params.toString()}`;
      script.onerror = () => { setStatus2('⚠ 雲端儲存失敗，已存本機', '#f59e0b'); resolve(); };
      document.head.appendChild(script);
      setTimeout(() => { setStatus2('⚠ 儲存逾時，已存本機', '#f59e0b'); resolve(); }, 10000);
    });
  } catch(e) {
    setStatus2('⚠ 雲端儲存失敗，已存本機', '#f59e0b');
  }
}

function getFiltered() {
  let result = quotes.filter(q => {
    const s = filters.search.toLowerCase();
    if (s && !`${q.client} ${q.model} ${q.endUser} ${q.country} ${q.agentNote} ${q.ivyNote}`.toLowerCase().includes(s)) return false;
    if (filters.status && q.status !== filters.status) return false;
    if (filters.countries.length && !filters.countries.includes(q.country)) return false;
    if (filters.clients.length && !filters.clients.includes(q.client)) return false;
    if (filters.dateFrom && q.date < filters.dateFrom) return false;
    if (filters.dateTo && q.date > filters.dateTo) return false;
    if (filters.hasFollowup && q.followUps.length === 0) return false;
    return true;
  });
  const sort = document.getElementById('sortSelect').value;
  result.sort((a,b) => {
    if (sort==='date-desc') return b.date.localeCompare(a.date);
    if (sort==='date-asc') return a.date.localeCompare(b.date);
    if (sort==='price-desc') return b.price - a.price;
    if (sort==='client-asc') return a.client.localeCompare(b.client);
    if (sort==='country-asc') return (a.country||'').localeCompare(b.country||'');
    if (sort==='followup-desc') {
      const da = a.followUps.length ? a.followUps[0].date : '';
      const db = b.followUps.length ? b.followUps[0].date : '';
      return db.localeCompare(da);
    }
    return 0;
  });
  return result;
}

function buildFilters() {
  // Countries
  const countryCounts = {};
  quotes.forEach(q => { if(q.country) countryCounts[q.country]=(countryCounts[q.country]||0)+1; });
  const countries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('countryChips').innerHTML = countries.map(([c,n]) =>
    `<div class="chip ${filters.countries.includes(c)?'active':''}" onclick="toggleFilter('countries','${c}')">${c} <span class="chip-count">${n}</span></div>`
  ).join('');

  // Clients
  const clientCounts = {};
  quotes.forEach(q => { if(q.client) clientCounts[q.client]=(clientCounts[q.client]||0)+1; });
  const clientSearch = document.getElementById('clientSearch').value.toLowerCase();
  const clients = Object.entries(clientCounts).sort((a,b)=>b[1]-a[1]).filter(([c])=>!clientSearch||c.toLowerCase().includes(clientSearch));
  document.getElementById('clientChips').innerHTML = clients.map(([c,n]) =>
    `<div class="chip ${filters.clients.includes(c)?'active':''}" onclick="toggleFilter('clients','${c}')">${c} <span class="chip-count">${n}</span></div>`
  ).join('');
}

function updateKPIs(filtered) {
  document.getElementById('totalCount').textContent = quotes.length;
  document.getElementById('kpi-pending').textContent = quotes.filter(q=>q.status==='pending').length;
  document.getElementById('kpi-won').textContent = quotes.filter(q=>q.status==='won').length;
  document.getElementById('kpi-lost').textContent = quotes.filter(q=>q.status==='lost').length;
  document.getElementById('kpi-replaced').textContent = quotes.filter(q=>q.status==='replaced').length;
  document.getElementById('kpi-filtered').textContent = filtered.length;
  const total = filtered.reduce((s,q)=>s+q.price,0);
  document.getElementById('kpi-amount').textContent = total >= 1000000 
    ? `$${(total/1000000).toFixed(1)}M` 
    : `$${(total/1000).toFixed(0)}K`;
}

function renderList() {
  buildFilters();
  const filtered = getFiltered();
  updateKPIs(filtered);
  document.getElementById('resultCount').textContent = `顯示 ${filtered.length} 筆`;
  
  const statusLabels = {pending:'⏳ 進行中', won:'✅ 已接單', lost:'❌ 失單', replaced:'🔄 已取代'};
  
  document.getElementById('quoteList').innerHTML = filtered.length === 0
    ? '<div class="empty">沒有符合條件的報價</div>'
    : filtered.map(q => `
      <div class="quote-card ${q.id===activeId?'active':''}" onclick="openPanel(${q.id})">
        <div class="card-top">
          <div class="card-date">${q.date}</div>
          <div class="card-main">

          ${q.endUser ? `<span class="tag tag-user">${q.endUser}</span>` : ''}

        </div>` : ''}
      </div>
    `).join('');
}

function toggleFilter(type, val) {
  const arr = filters[type];
  const idx = arr.indexOf(val);
  if (idx>=0) arr.splice(idx,1);
  else arr.push(val);
  renderList();
}

function setStatus(s) {
  filters.status = s;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  if (!s) document.querySelector('.status-btn.all').classList.add('active');
  else document.querySelector(`.status-btn.${s}`).classList.add('active');
  renderList();
}

function toggleHasFollowup() {
  filters.hasFollowup = !filters.hasFollowup;
  const btn = document.getElementById('btnHasFollowup');
  if (filters.hasFollowup) {
    btn.style.background = 'var(--accent)';
    btn.style.color = 'white';
  } else {
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--accent)';
  }
  renderList();
}

function clearFilters() {
  filters = {search:'',status:'',countries:[],clients:[],dateFrom:'',dateTo:'',hasFollowup:false};
  document.getElementById('searchBox').value='';
  document.getElementById('clientSearch').value='';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.status-btn.all').classList.add('active');
  const btn = document.getElementById('btnHasFollowup');
  if (btn) { btn.style.background='var(--surface)'; btn.style.color='var(--accent)'; }
  renderList();
}

      <div class="status-row">
        <button class="status-pick pending ${q.status==='pending'?'active':''}" onclick="updateStatus(${id},'pending')">⏳ 進行中</button>
        <button class="status-pick won ${q.status==='won'?'active':''}" onclick="updateStatus(${id},'won')">✅ 已接單</button>
        <button class="status-pick lost ${q.status==='lost'?'active':''}" onclick="updateStatus(${id},'lost')">❌ 失單</button>
        <button class="status-pick replaced ${q.status==='replaced'?'active':''}" onclick="updateStatus(${id},'replaced')">🔄 已取代</button>
      </div>
    </div>

    <div>
      <div class="section-title">Ivy 備註</div>
      <textarea class="ivy-note-area" id="ivyNoteArea" placeholder="輸入你的備註…">${q.ivyNote||''}</textarea>
      <div style="margin-top:8px"><button class="btn-save" onclick="saveIvyNote(${id})">儲存備註</button></div>
    </div>

    <div>
      <div class="section-title">
        <span>進度追蹤記錄</span>
        <span style="font-size:0.8rem;color:var(--text2);text-transform:none">${q.followUps.length} 筆</span>
      </div>
      <div class="followups" id="followupList">
        ${q.followUps.length === 0 ? '<div style="color:var(--text3);font-size:0.82rem">尚無追蹤記錄</div>' :
          q.followUps.map((f,i)=>`
            <div class="followup-item">
              <div class="followup-date">${f.date}</div>
              <div class="followup-text">${f.text}</div>
              <button class="followup-delete" onclick="deleteFollowup(${id},${i})">✕</button>
            </div>
          `).join('')}
      </div>
      <div class="add-followup" style="margin-top:10px">
        <div class="add-followup-row">
          <input type="date" id="fuDate" value="${new Date().toISOString().slice(0,10)}">
          <textarea id="fuText" placeholder="輸入追蹤內容…"></textarea>
        </div>
        <button class="btn-add" onclick="addFollowup(${id})">+ 新增記錄</button>
      </div>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');
}

function closePanel() {
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  renderList();
}

function updateStatus(id, status) {
  const q = quotes.find(x=>x.id===id);
  if (!q) return;
  q.status = status;
  saveData(q);
  openPanel(id);
  renderList();
}

function saveEndUser(id) {
  const q = quotes.find(x=>x.id===id);
  if (!q) return;
  q.endUser = document.getElementById('endUserInput').value;
  saveData(q);
  renderList();
}

function saveClient(id) {
  const q = quotes.find(x=>x.id===id);
  if (!q) return;
  q.client = document.getElementById('clientInput').value;
  saveData(q);
  openPanel(id);
  renderList();
}

function exportBackup() {
  // Only export user-edited fields to keep file small
  const edits = quotes.map(q => ({
    id: q.id,
    client: q.client,
    endUser: q.endUser,
    status: q.status,
    ivyNote: q.ivyNote,
    followUps: q.followUps
  }));
  const blob = new Blob([JSON.stringify(edits, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date().toISOString().slice(0,10);
  a.download = `dowell_backup_${d}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  const el = document.getElementById('saveStatus');
  el.textContent = `✓ 備份已下載`;
  setTimeout(()=>el.textContent='',3000);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const edits = JSON.parse(e.target.result);
      const editMap = {};
      edits.forEach(x => editMap[x.id] = x);
      quotes = RAW_DATA.map(r => {
        const saved = editMap[r.id];
        if (saved) {
          return {...r,
            client: saved.client ?? r.client,
            endUser: saved.endUser ?? r.endUser,
            status: saved.status ?? r.status,
            ivyNote: saved.ivyNote ?? '',
            followUps: saved.followUps ?? []
          };
        }
        return {...r};
      });
      saveData();
      closePanel();
      renderList();
      const el = document.getElementById('saveStatus');
      el.textContent = '✓ 備份已載入';
      setTimeout(()=>el.textContent='',3000);
    } catch(err) {
      alert('備份檔案格式錯誤，請確認是正確的 JSON 檔案');
    }
  };
  reader.readAsText(file);
  // Reset so same file can be re-imported
  event.target.value = '';
}

function saveIvyNote(id) {
  const q = quotes.find(x=>x.id===id);
  if (!q) return;
  q.ivyNote = document.getElementById('ivyNoteArea').value;
  saveData(q);
  openPanel(id);
}

function addFollowup(id) {
  const q = quotes.find(x=>x.id===id);
  const date = document.getElementById('fuDate').value;
  const text = document.getElementById('fuText').value.trim();
  if (!date || !text) return;
  q.followUps.push({date, text});
  q.followUps.sort((a,b)=>b.date.localeCompare(a.date));
  saveData(q);
  openPanel(id);
}

function deleteFollowup(id, idx) {
  const q = quotes.find(x=>x.id===id);
  q.followUps.splice(idx,1);
  saveData(q);
  openPanel(id);
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const edits = JSON.parse(e.target.result);
      const editMap = {};
      edits.forEach(x => editMap[x.id] = x);
      quotes = RAW_DATA.map(r => {
        const s = editMap[r.id];
        return s ? {...r, client:s.client??r.client, endUser:s.endUser??r.endUser, status:s.status??r.status, ivyNote:s.ivyNote??'', followUps:s.followUps??[]} : {...r};
      });
      // Save to localStorage
      localStorage.setItem(STORAGE_KEY, JSON.stringify(quotes));
      // Bulk save to Google Sheets if connected
      if (useSheets()) {
        setStatus2('⟳ 上傳備份到 Google Sheets…', '#aaa');
        try {
          const records = quotes.map(q => ({id:q.id, client:q.client, endUser:q.endUser, status:q.status, ivyNote:q.ivyNote, followUps:q.followUps}));
          const resp = await fetch(APPS_SCRIPT_URL, {
            method:'POST',
            body: JSON.stringify({method:'SAVE_ALL', records}),
            headers:{'Content-Type':'text/plain'}
          });
          const json = await resp.json();
          if (json.ok) setStatus2(`✓ 備份已載入並同步到 Google Sheets（${json.count} 筆）`, '#16a34a');
          else setStatus2('⚠ 載入成功，但雲端同步失敗', '#f59e0b');
        } catch(err) {
          setStatus2('⚠ 載入成功，但雲端同步失敗', '#f59e0b');
        }
      } else {
        setStatus2('✓ 備份已載入（本機）', '#f59e0b');
      }
      closePanel();
      renderList();
    } catch(err) {
      alert('備份檔案格式錯誤，請確認是正確的 JSON 檔案');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Events
document.getElementById('searchBox').addEventListener('input', e => { filters.search = e.target.value; renderList(); });
document.getElementById('clientSearch').addEventListener('input', () => buildFilters());
document.getElementById('dateFrom').addEventListener('change', e => { filters.dateFrom = e.target.value; renderList(); });
document.getElementById('dateTo').addEventListener('change', e => { filters.dateTo = e.target.value; renderList(); });

// Init
loadData().then(() => renderList());
renderList(); // render immediately with local data while loading
</script>
</body>
</html>
